<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約管理後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
  <style>
    .btn {
      min-height: 44px;
      font-size: 14px;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.98); }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* FullCalendar 樣式調整 */
    .fc { font-size: 12px; }
    .fc .fc-toolbar-title { font-size: 16px; }
    .fc .fc-button { padding: 4px 8px; font-size: 12px; }
    .fc-event-pending { background-color: #f59e0b !important; border-color: #d97706 !important; }
    .fc-event-confirmed { background-color: #10b981 !important; border-color: #059669 !important; }
    .fc-event-busy { background-color: #374151 !important; border-color: #1f2937 !important; color: #fff !important; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  
  <!-- 頂部導航 -->
  <header class="bg-white shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <h1 class="text-xl font-bold text-gray-800">🔧 預約管理後台</h1>
        <a href="index.html" class="text-sm text-blue-600 hover:underline">← 返回預約頁面</a>
      </div>
      <div id="admin-info" class="flex items-center gap-3"></div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">
    
    <!-- 未登入/權限不足 -->
    <div id="login-section" class="text-center py-12 bg-white rounded-xl shadow-sm">
      <div class="text-6xl mb-4">🔐</div>
      <h2 class="text-xl font-bold mb-2">管理員登入</h2>
      <p class="text-gray-600 mb-6">請使用教師帳號登入</p>
      <button id="admin-login-btn" class="btn bg-blue-600 text-white px-8 py-3">使用 Google 登入</button>
    </div>

    <!-- 已登入狀態 -->
    <div id="admin-section" class="hidden space-y-6">
      
      <!-- 統計 -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-center">
          <p class="text-2xl font-bold text-yellow-600" id="stat-pending">-</p>
          <p class="text-sm text-yellow-700">待審核</p>
        </div>
        <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
          <p class="text-2xl font-bold text-green-600" id="stat-confirmed">-</p>
          <p class="text-sm text-green-700">已確認</p>
        </div>
        <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 text-center">
          <p class="text-2xl font-bold text-gray-600" id="stat-total">-</p>
          <p class="text-sm text-gray-700">總申請</p>
        </div>
      </div>
      
      <!-- 兩欄佈局 -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <!-- 行事曆 -->
        <div class="bg-white rounded-xl shadow-sm p-4">
          <h2 class="font-bold text-gray-800 mb-3">📅 行事曆總覽</h2>
          <p class="text-xs text-gray-500 mb-3">點選日期查看該時段行程（含 Google Calendar 已安排行程）</p>
          <div id="admin-calendar"></div>
          <div class="mt-3 flex gap-4 text-xs flex-wrap">
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-amber-500"></span> 待審核</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-green-500"></span> 已確認</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-gray-700"></span> 行事曆行程</span>
          </div>
        </div>
        
        <!-- 待審核列表 -->
        <div class="bg-white rounded-xl shadow-sm">
          <div class="px-4 py-3 border-b flex items-center justify-between">
            <h2 class="font-bold text-gray-800">📋 待審核申請</h2>
            <button onclick="loadPendingRequests()" class="text-sm text-blue-600 hover:underline">重新整理</button>
          </div>
          <div id="pending-list" class="p-4 max-h-96 overflow-y-auto">
            <div class="text-center py-8 text-gray-500">載入中...</div>
          </div>
        </div>
      </div>
      
      <!-- 所有預約 -->
      <div class="bg-white rounded-xl shadow-sm">
        <div class="px-4 py-3 border-b flex items-center justify-between">
          <h2 class="font-bold text-gray-800">📋 所有預約記錄</h2>
          <button onclick="loadAllBookings()" class="text-sm text-blue-600 hover:underline">重新整理</button>
        </div>
        <div id="all-bookings" class="p-4">
          <div class="text-center py-8 text-gray-500">載入中...</div>
        </div>
      </div>
    </div>
    
    <!-- 權限不足 -->
    <div id="no-access" class="hidden text-center py-12 bg-white rounded-xl shadow-sm">
      <div class="text-6xl mb-4">⛔</div>
      <h2 class="text-xl font-bold mb-2 text-red-600">權限不足</h2>
      <p class="text-gray-600">此頁面僅限管理員使用</p>
      <a href="index.html" class="inline-block mt-4 text-blue-600 hover:underline">返回預約頁面</a>
    </div>
  </main>

  <!-- 日期詳情 Modal -->
  <div id="date-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" onclick="closeDateModal(event)">
    <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 max-h-[80vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-lg" id="modal-date-title">日期詳情</h3>
        <button onclick="closeDateModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <div id="modal-content">載入中...</div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg hidden"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwmCnlbS-bD9liKfVrPI6Efi1Yw8c8-OADUpK4iyg0yVC7a5UXXpynRVtYh2pGPg_zekQ/exec';
    const ADMIN_EMAIL = 'scwu@gms.npu.edu.tw';
    const GOOGLE_CLIENT_ID = '265200476894-8l4n76mpki2hstv909729uaoao5rh065.apps.googleusercontent.com';
    
    let currentAdmin = null;
    let adminCalendar = null;

    // 頁面載入時檢查登入狀態
    document.addEventListener('DOMContentLoaded', () => {
      checkLoginStatus();
    });

    function checkLoginStatus() {
      // 從 localStorage 讀取已登入的用戶（與前台共享）
      const savedUser = localStorage.getItem('user');
      if (savedUser) {
        const user = JSON.parse(savedUser);
        if (user.email === ADMIN_EMAIL) {
          currentAdmin = user;
          showAdminUI();
          return;
        } else {
          // 已登入但不是管理員
          document.getElementById('login-section').classList.add('hidden');
          document.getElementById('no-access').classList.remove('hidden');
          return;
        }
      }
      // 未登入，顯示登入按鈕
    }

    // 登入按鈕
    document.getElementById('admin-login-btn').addEventListener('click', () => {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleAdminLogin
      });
      google.accounts.id.prompt();
    });

    function handleAdminLogin(response) {
      try {
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => 
          '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join(''));
        const payload = JSON.parse(jsonPayload);
        
        if (payload.email !== ADMIN_EMAIL) {
          document.getElementById('login-section').classList.add('hidden');
          document.getElementById('no-access').classList.remove('hidden');
          return;
        }
        
        currentAdmin = {
          email: payload.email,
          name: payload.name || payload.email.split('@')[0],
          picture: payload.picture || ''
        };
        
        // 儲存到 localStorage（與前台共享）
        localStorage.setItem('user', JSON.stringify(currentAdmin));
        
        showAdminUI();
      } catch(e) {
        showToast('登入失敗', 'error');
      }
    }

    function showAdminUI() {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('admin-section').classList.remove('hidden');
      document.getElementById('admin-info').innerHTML = `
        <span class="text-sm text-gray-600">${currentAdmin.name}</span>
        <button onclick="logout()" class="text-sm text-red-500">登出</button>
      `;
      
      initCalendar();
      loadPendingRequests();
      loadAllBookings();
    }

    function logout() {
      localStorage.removeItem('user');
      currentAdmin = null;
      location.reload();
    }

    // 初始化行事曆
    function initCalendar() {
      const calendarEl = document.getElementById('admin-calendar');
      adminCalendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'zh-tw',
        height: 'auto',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: ''
        },
        dateClick: function(info) {
          showDateDetail(info.dateStr);
        },
        events: fetchCalendarEvents
      });
      adminCalendar.render();
    }

    // 從 API 取得行事曆事件（包含 Google Calendar 行程）
    async function fetchCalendarEvents(info, successCallback, failureCallback) {
      const events = [];
      
      try {
        // 取得預約記錄
        const bookingRes = await fetch(`${API_URL}?action=getAllBookings`);
        const bookings = await bookingRes.json();
        
        if (Array.isArray(bookings)) {
          bookings.forEach(b => {
            // 只顯示有效的預約（pending 或 confirmed）
            if (b.status === 'pending' || b.status === 'confirmed') {
              events.push({
                title: `${b.name} - ${b.purpose || '預約'}`,
                start: b.startTime,
                end: b.endTime,
                classNames: [b.status === 'confirmed' ? 'fc-event-confirmed' : 'fc-event-pending'],
                extendedProps: { booking: b }
              });
            }
          });
        }
        
        // 取得 Google Calendar 忙碌時段（從 getSlots API）
        // 計算顯示範圍內的每一天
        const start = new Date(info.startStr);
        const end = new Date(info.endStr);
        const datePromises = [];
        
        for (let d = new Date(start); d < end; d.setDate(d.getDate() + 7)) {
          const dateStr = d.toISOString().split('T')[0];
          datePromises.push(
            fetch(`${API_URL}?action=getSlots&date=${dateStr}`)
              .then(r => r.json())
              .catch(() => ({}))
          );
        }
        
        const slotResults = await Promise.all(datePromises);
        slotResults.forEach(data => {
          if (data.busySlots) {
            data.busySlots.forEach(slot => {
              // 檢查是否已有相同時段的預約事件（避免重複）
              const isDuplicate = events.some(e => 
                new Date(e.start).getTime() === new Date(slot.start).getTime() &&
                new Date(e.end).getTime() === new Date(slot.end).getTime()
              );
              if (!isDuplicate) {
                events.push({
                  title: slot.title || '行事曆行程',
                  start: slot.start,
                  end: slot.end,
                  classNames: ['fc-event-busy'],
                  display: 'block'
                });
              }
            });
          }
        });
        
        successCallback(events);
      } catch(e) {
        console.error('載入行事曆失敗', e);
        successCallback([]);
      }
    }

    // 顯示日期詳情
    async function showDateDetail(dateStr) {
      const modal = document.getElementById('date-modal');
      const title = document.getElementById('modal-date-title');
      const content = document.getElementById('modal-content');
      
      const d = new Date(dateStr);
      title.textContent = d.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      content.innerHTML = '<div class="text-center py-4"><div class="spinner mx-auto"></div></div>';
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      
      try {
        const res = await fetch(`${API_URL}?action=getSlots&date=${dateStr}`);
        const data = await res.json();
        
        let html = '';
        
        // 顯示忙碌時段（Google Calendar）
        if (data.busySlots && data.busySlots.length > 0) {
          html += '<div class="mb-4">';
          html += '<h4 class="font-bold text-gray-700 mb-2">📅 行事曆行程</h4>';
          html += '<div class="space-y-2">';
          data.busySlots.forEach(busy => {
            const start = new Date(busy.start).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            const end = new Date(busy.end).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            html += `<div class="bg-gray-100 rounded p-2 text-sm">
              <span class="font-medium">${start} ~ ${end}</span>
              ${busy.title ? `<span class="text-gray-600 ml-2">${busy.title}</span>` : ''}
            </div>`;
          });
          html += '</div></div>';
        }
        
        // 顯示待審核預約
        if (data.pendingSlots && data.pendingSlots.length > 0) {
          html += '<div class="mb-4">';
          html += '<h4 class="font-bold text-amber-600 mb-2">⏳ 待審核預約</h4>';
          html += '<div class="space-y-2">';
          data.pendingSlots.forEach(pending => {
            const start = new Date(pending.start).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            const end = new Date(pending.end).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            html += `<div class="bg-amber-50 border border-amber-200 rounded p-2 text-sm">
              <span class="font-medium">${start} ~ ${end}</span>
            </div>`;
          });
          html += '</div></div>';
        }
        
        // 顯示可用時段
        if (data.availableSlots && data.availableSlots.length > 0) {
          html += '<div>';
          html += '<h4 class="font-bold text-green-600 mb-2">✅ 可預約時段</h4>';
          html += '<div class="flex flex-wrap gap-2">';
          data.availableSlots.forEach(slot => {
            const start = new Date(slot.start).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            html += `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-sm">${start}</span>`;
          });
          html += '</div></div>';
        }
        
        if (!html) {
          html = '<p class="text-gray-500 text-center">無資料</p>';
        }
        
        content.innerHTML = html;
      } catch(e) {
        content.innerHTML = '<p class="text-red-500 text-center">載入失敗</p>';
      }
    }

    function closeDateModal(event) {
      if (event && event.target !== event.currentTarget) return;
      const modal = document.getElementById('date-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // 載入待審核
    async function loadPendingRequests() {
      const list = document.getElementById('pending-list');
      list.innerHTML = '<div class="text-center py-4"><div class="spinner mx-auto"></div></div>';
      
      try {
        const res = await fetch(`${API_URL}?action=getPendingRequests`);
        const data = await res.json();
        
        document.getElementById('stat-pending').textContent = data.length;
        
        if (data.length === 0) {
          list.innerHTML = '<p class="text-center text-gray-500 py-8">🎉 沒有待審核的申請</p>';
          return;
        }
        
        list.innerHTML = data.map(b => `
          <div class="border rounded-lg p-3 mb-3" id="booking-${b.id}">
            <div class="flex justify-between items-start mb-2">
              <div>
                <p class="font-bold">${b.name}</p>
                <p class="text-xs text-gray-500">${b.email}</p>
              </div>
              <span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs">待審核</span>
            </div>
            <div class="bg-gray-50 rounded p-2 mb-2 text-sm">
              <p><strong>時間：</strong>${formatDateTime(b.startTime)} ~ ${formatTime(b.endTime)}</p>
              <p><strong>事由：</strong>${b.purpose || '未填寫'}</p>
            </div>
            <div class="flex gap-2">
              <button onclick="confirmBooking('${b.id}')" class="btn flex-1 bg-green-600 text-white py-2 text-sm">✓ 確認</button>
              <button onclick="rejectBooking('${b.id}')" class="btn flex-1 bg-red-100 text-red-600 py-2 text-sm">✗ 拒絕</button>
            </div>
          </div>
        `).join('');
      } catch(e) {
        list.innerHTML = '<p class="text-center text-red-500 py-8">載入失敗</p>';
      }
    }

    // 載入所有預約
    async function loadAllBookings() {
      const list = document.getElementById('all-bookings');
      list.innerHTML = '<div class="text-center py-4"><div class="spinner mx-auto"></div></div>';
      
      try {
        const res = await fetch(`${API_URL}?action=getAllBookings`);
        const data = await res.json();
        
        if (!Array.isArray(data)) {
          throw new Error('Invalid response');
        }
        
        const confirmed = data.filter(b => b.status === 'confirmed').length;
        document.getElementById('stat-confirmed').textContent = confirmed;
        document.getElementById('stat-total').textContent = data.length;
        
        if (data.length === 0) {
          list.innerHTML = '<p class="text-center text-gray-500 py-8">尚無預約記錄</p>';
          return;
        }
        
        data.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));
        
        list.innerHTML = `
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-3 py-2 text-left">學生</th>
                  <th class="px-3 py-2 text-left">時間</th>
                  <th class="px-3 py-2 text-left">事由</th>
                  <th class="px-3 py-2 text-center">狀態</th>
                </tr>
              </thead>
              <tbody>
                ${data.slice(0, 30).map(b => `
                  <tr class="border-t">
                    <td class="px-3 py-2">
                      <p class="font-medium">${b.name}</p>
                      <p class="text-xs text-gray-500">${b.email}</p>
                    </td>
                    <td class="px-3 py-2 text-xs">${formatDateTime(b.startTime)}</td>
                    <td class="px-3 py-2 text-xs">${b.purpose || '-'}</td>
                    <td class="px-3 py-2 text-center">
                      <span class="px-2 py-1 rounded text-xs ${getStatusClass(b.status)}">${getStatusText(b.status)}</span>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
        
        if (adminCalendar) adminCalendar.refetchEvents();
      } catch(e) {
        console.error('loadAllBookings error:', e);
        list.innerHTML = '<p class="text-center text-red-500 py-8">載入失敗（請確認已部署最新版 Code.gs）</p>';
      }
    }

    // 確認預約
    async function confirmBooking(bookingId) {
      if (!confirm('確定要確認此預約？將會發送通知給學生並加入行事曆。')) return;
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'confirmBooking', bookingId })
        });
        const data = await res.json();
        
        if (data.success) {
          showToast('已確認！已發送通知給學生');
          loadPendingRequests();
          loadAllBookings();
        } else {
          showToast(data.error || '操作失敗', 'error');
        }
      } catch(e) {
        showToast('網路錯誤', 'error');
      }
    }

    // 拒絕預約
    async function rejectBooking(bookingId) {
      const reason = prompt('拒絕原因（可留空）：');
      if (reason === null) return;
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'rejectBooking', bookingId, reason })
        });
        const data = await res.json();
        
        if (data.success) {
          showToast('已拒絕');
          loadPendingRequests();
          loadAllBookings();
        } else {
          showToast(data.error || '操作失敗', 'error');
        }
      } catch(e) {
        showToast('網路錯誤', 'error');
      }
    }

    // 輔助函數
    function formatDateTime(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric', weekday: 'short' }) + 
             ' ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    }
    
    function formatTime(dateStr) {
      return new Date(dateStr).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    }

    function getStatusText(s) {
      return { pending: '待審核', confirmed: '已確認', rejected: '已拒絕', cancelled: '已取消' }[s] || s;
    }

    function getStatusClass(s) {
      return {
        pending: 'bg-yellow-100 text-yellow-700',
        confirmed: 'bg-green-100 text-green-700',
        rejected: 'bg-red-100 text-red-700',
        cancelled: 'bg-gray-100 text-gray-700'
      }[s] || 'bg-gray-100';
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-lg ${
        type === 'error' ? 'bg-red-600 text-white' : 'bg-gray-800 text-white'
      }`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }
  </script>
</body>
</html>
